@let vm = facade.vm();

<main class="shell">
  <app-conversation-header
    [modeLabel]="vm.modeLabel"
    [threadId]="vm.threadId"
    [status]="vm.status"
    [historyCount]="vm.historyCount"
    [agentMode]="vm.agentMode"
    [busy]="vm.busy"
    (agentModeChange)="facade.toggleAgentMode($event)"
  />

  <section class="workspace">
    <article class="panel transcript-panel">
      <app-transcript-panel
        [messages]="vm.messages"
        [reasoningText]="vm.reasoningText"
        [toolActivity]="vm.toolActivity"
        [surfaces]="vm.surfaces"
        (resetConversation)="facade.resetConversation()"
        (quickAction)="facade.useQuickAction($event)"
      />

      <app-prompt-composer
        [draft]="vm.draft"
        [busy]="vm.busy"
        [status]="vm.status"
        (draftChange)="facade.setDraft($event)"
        (submitPrompt)="facade.submitPrompt()"
      />
    </article>
  </section>
</main>
